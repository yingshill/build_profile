<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 694" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">

  <!-- Canvas -->
  <rect width="960" height="694" fill="#ffffff"/>

  <!-- Header -->
  <text x="480" y="32" font-size="13" font-weight="700" fill="#1A2030" text-anchor="middle">Signal to Asset — Code Walkthrough</text>
  <text x="480" y="50" font-size="9" fill="#787774" text-anchor="middle" letter-spacing="1.5">PORTFOLIO ARTIFACT · NOTION LIGHT · 2026-05</text>
  <line x1="42" y1="62" x2="918" y2="62" stroke="#e9e9e7" stroke-width="1"/>

  <!-- ─────────────────── ROW 1 ─────────────────── -->

  <!-- SLIDE 01 — Cover -->
  <rect x="42" y="72" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="42" y="72" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="42" y="75" width="210" height="2" fill="#1A2030"/>
  <text x="240" y="90" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">01</text>
  <text x="56" y="98" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">COVER</text>

  <text x="147" y="148" font-size="30" font-weight="800" fill="#1A2030" text-anchor="middle">1 URL</text>
  <text x="147" y="168" font-size="18" fill="#c9c8c7" text-anchor="middle">↓</text>
  <text x="147" y="194" font-size="15" font-weight="700" fill="#C8A870" text-anchor="middle">5 Posts. Done.</text>
  <text x="147" y="214" font-size="9" fill="#787774" text-anchor="middle">LinkedIn · RedNote · X · Notion Publish</text>

  <line x1="66" y1="228" x2="228" y2="228" stroke="#e9e9e7" stroke-width="1"/>
  <text x="147" y="248" font-size="8.5" fill="#787774" text-anchor="middle" font-weight="600">Signal to Asset</text>
  <text x="147" y="264" font-size="8" fill="#c9c8c7" text-anchor="middle">Claude Code Agent · 2026</text>

  <!-- SLIDE 02 — Problem -->
  <rect x="264" y="72" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="264" y="72" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="264" y="75" width="210" height="2" fill="#1A2030"/>
  <text x="462" y="90" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">02</text>
  <text x="278" y="98" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">THE PROBLEM</text>

  <text x="278" y="120" font-size="11.5" font-weight="700" fill="#1A2030">One good idea.</text>
  <text x="278" y="138" font-size="9.5" fill="#787774">To turn it into a post, you need:</text>

  <rect x="278" y="148" width="182" height="22" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <text x="290" y="163" font-size="9" fill="#1A2030">① Draft the angle</text>

  <rect x="278" y="175" width="182" height="22" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <text x="290" y="190" font-size="9" fill="#1A2030">② Write the full post</text>

  <rect x="278" y="202" width="182" height="22" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <text x="290" y="217" font-size="9" fill="#1A2030">③ Reformat per channel</text>

  <rect x="278" y="229" width="182" height="22" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <text x="290" y="244" font-size="9" fill="#1A2030">④ Create publish tasks</text>

  <text x="278" y="268" font-size="9" fill="#9E6B55" font-weight="600">30–60 min. Per idea. Per channel.</text>

  <!-- SLIDE 03 — System -->
  <rect x="486" y="72" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="486" y="72" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="486" y="75" width="210" height="2" fill="#1A2030"/>
  <text x="684" y="90" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">03</text>
  <text x="500" y="98" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">THE SYSTEM</text>

  <rect x="506" y="108" width="74" height="30" rx="5" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="506" y="108" width="3" height="30" rx="2" fill="#C8A870"/>
  <text x="524" y="120" font-size="8" fill="#1A2030" font-weight="700">Notion</text>
  <text x="524" y="132" font-size="8" fill="#787774">Source URL</text>

  <text x="590" y="127" font-size="10" fill="#c9c8c7" text-anchor="middle">→</text>

  <rect x="600" y="108" width="74" height="30" rx="5" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="600" y="108" width="3" height="30" rx="2" fill="#C8A870"/>
  <text x="618" y="120" font-size="8" fill="#1A2030" font-weight="700">Claude</text>
  <text x="618" y="132" font-size="8" fill="#787774">Code Agent</text>

  <text x="591" y="158" font-size="10" fill="#c9c8c7" text-anchor="middle">↓</text>

  <rect x="506" y="164" width="168" height="30" rx="5" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="506" y="164" width="3" height="30" rx="2" fill="#7B9EA6"/>
  <text x="524" y="176" font-size="8" fill="#1A2030" font-weight="700">5 Assets + To-Dos</text>
  <text x="524" y="188" font-size="8" fill="#787774">saved to Notion</text>

  <line x1="506" y1="210" x2="674" y2="210" stroke="#e9e9e7" stroke-width="1"/>
  <text x="500" y="228" font-size="9" fill="#1A2030" font-weight="600">3 Python scripts.</text>
  <text x="500" y="244" font-size="9" fill="#787774">fetch_entry → create_asset</text>
  <text x="500" y="258" font-size="9" fill="#787774">→ create_todo</text>
  <text x="500" y="276" font-size="8.5" fill="#C8A870" font-weight="600">~2 min end-to-end.</text>

  <!-- SLIDE 04 — Step 1 Fetch -->
  <rect x="708" y="72" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="708" y="72" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="708" y="75" width="210" height="2" fill="#1A2030"/>
  <text x="906" y="90" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">04</text>
  <text x="722" y="98" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">STEP 1 · FETCH</text>

  <rect x="722" y="106" width="182" height="22" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="722" y="106" width="3" height="22" rx="2" fill="#C8A870"/>
  <text x="813" y="121" font-size="8.5" fill="#1A2030" font-weight="700" text-anchor="middle">fetch_entry.py</text>

  <text x="722" y="144" font-size="9" fill="#787774">Reads from Notion source page:</text>

  <text x="730" y="164" font-size="9" fill="#1A2030">→  Title</text>
  <text x="730" y="180" font-size="9" fill="#1A2030">→  Core Insight</text>
  <text x="730" y="196" font-size="9" fill="#1A2030">→  Why It Matters</text>
  <text x="730" y="212" font-size="9" fill="#1A2030">→  Source URL</text>
  <text x="730" y="228" font-size="9" fill="#1A2030">→  Status</text>

  <line x1="722" y1="240" x2="890" y2="240" stroke="#e9e9e7" stroke-width="1"/>
  <text x="722" y="258" font-size="8.5" fill="#787774">Returns structured dict.</text>
  <text x="722" y="274" font-size="8.5" fill="#787774">Caches response (10 min TTL).</text>

  <!-- ─────────────────── ROW 2 ─────────────────── -->

  <!-- SLIDE 05 — Step 2 Draft -->
  <rect x="42" y="368" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="42" y="368" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="42" y="371" width="210" height="2" fill="#1A2030"/>
  <text x="240" y="386" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">05</text>
  <text x="56" y="394" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">STEP 2 · DRAFT</text>

  <text x="56" y="414" font-size="9.5" fill="#1A2030" font-weight="600">Claude writes 5 assets:</text>

  <rect x="56" y="422" width="182" height="24" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="56" y="422" width="3" height="24" rx="2" fill="#C8A870"/>
  <text x="66" y="434" font-size="8.5" fill="#1A2030" font-weight="700">LinkedIn · PM angle</text>
  <text x="66" y="444" font-size="8" fill="#787774">Hook-first · under 1,300 chars</text>

  <rect x="56" y="450" width="182" height="24" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="56" y="450" width="3" height="24" rx="2" fill="#C8A870"/>
  <text x="66" y="462" font-size="8.5" fill="#1A2030" font-weight="700">LinkedIn · DE angle</text>
  <text x="66" y="472" font-size="8" fill="#787774">Same insight, different audience</text>

  <rect x="56" y="478" width="182" height="24" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="56" y="478" width="3" height="24" rx="2" fill="#C8A870"/>
  <text x="66" y="490" font-size="8.5" fill="#1A2030" font-weight="700">RedNote Carousel</text>
  <text x="66" y="500" font-size="8" fill="#787774">Caption + design brief + slides</text>

  <rect x="56" y="506" width="182" height="24" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="56" y="506" width="3" height="24" rx="2" fill="#C8A870"/>
  <text x="66" y="518" font-size="8.5" fill="#1A2030" font-weight="700">X / Twitter</text>
  <text x="66" y="528" font-size="8" fill="#787774">Punchy thread or single post</text>

  <rect x="56" y="534" width="182" height="24" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="56" y="534" width="3" height="24" rx="2" fill="#C8A870"/>
  <text x="66" y="546" font-size="8.5" fill="#1A2030" font-weight="700">Notion Publish Page</text>
  <text x="66" y="556" font-size="8" fill="#787774">Cleaned republish of source entry</text>

  <text x="56" y="576" font-size="8" fill="#787774">Human approval gate before saving.</text>

  <!-- SLIDE 06 — Step 3 Save -->
  <rect x="264" y="368" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="264" y="368" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="264" y="371" width="210" height="2" fill="#1A2030"/>
  <text x="462" y="386" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">06</text>
  <text x="278" y="394" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">STEP 3 · SAVE</text>

  <rect x="278" y="402" width="182" height="22" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="278" y="402" width="3" height="22" rx="2" fill="#C8A870"/>
  <text x="369" y="417" font-size="8.5" fill="#1A2030" font-weight="700" text-anchor="middle">create_asset.py</text>

  <text x="278" y="440" font-size="9" fill="#787774">Writes to Marketing Assets DB:</text>
  <text x="286" y="456" font-size="8.5" fill="#1A2030">· Asset name, type, channel</text>
  <text x="286" y="471" font-size="8.5" fill="#1A2030">· Hook, content, topic tags</text>
  <text x="286" y="486" font-size="8.5" fill="#1A2030">· Linked project ID</text>
  <text x="286" y="501" font-size="8.5" fill="#1A2030">· Carousel brief + slides</text>

  <rect x="278" y="512" width="182" height="22" rx="4" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="278" y="512" width="3" height="22" rx="2" fill="#C8A870"/>
  <text x="369" y="527" font-size="8.5" fill="#1A2030" font-weight="700" text-anchor="middle">create_todo.py</text>

  <text x="278" y="549" font-size="9" fill="#787774">Creates linked tasks per asset:</text>
  <text x="286" y="565" font-size="8.5" fill="#1A2030">Post → Review, Publish</text>
  <text x="286" y="580" font-size="8.5" fill="#1A2030">Carousel → Review, Design, Publish</text>

  <!-- SLIDE 07 — Results -->
  <rect x="486" y="368" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="486" y="368" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="486" y="371" width="210" height="2" fill="#1A2030"/>
  <text x="684" y="386" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">07</text>
  <text x="500" y="394" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">THE RESULT</text>

  <text x="591" y="432" font-size="36" font-weight="800" fill="#1A2030" text-anchor="middle">~2 min</text>
  <text x="591" y="450" font-size="9.5" fill="#787774" text-anchor="middle">from URL to ready-to-review</text>
  <text x="591" y="465" font-size="8" fill="#c9c8c7" text-anchor="middle">API cost: ~$0.05 / run</text>

  <line x1="516" y1="478" x2="666" y2="478" stroke="#e9e9e7" stroke-width="1"/>

  <text x="500" y="497" font-size="9" fill="#7B9EA6">✓  5 assets drafted</text>
  <text x="500" y="513" font-size="9" fill="#7B9EA6">✓  8+ to-dos created</text>
  <text x="500" y="529" font-size="9" fill="#7B9EA6">✓  All linked in Notion</text>
  <text x="500" y="545" font-size="9" fill="#7B9EA6">✓  Zero manual formatting</text>

  <line x1="516" y1="558" x2="666" y2="558" stroke="#e9e9e7" stroke-width="1"/>
  <text x="500" y="574" font-size="8.5" fill="#787774">Human reviews drafts.</text>
  <text x="500" y="588" font-size="8.5" fill="#787774">Agent never publishes.</text>

  <!-- SLIDE 08 — CTA -->
  <rect x="708" y="368" width="210" height="268" rx="8" fill="#F0ECE3" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="708" y="368" width="210" height="5" rx="4" fill="#1A2030"/>
  <rect x="708" y="371" width="210" height="2" fill="#1A2030"/>
  <text x="906" y="386" font-size="9" fill="#c9c8c7" text-anchor="end" font-weight="600">08</text>
  <text x="722" y="394" font-size="7.5" fill="#787774" letter-spacing="1.2" font-weight="600">OPEN SOURCE</text>

  <text x="813" y="430" font-size="11.5" font-weight="700" fill="#1A2030" text-anchor="middle">Built with</text>
  <rect x="736" y="438" width="154" height="28" rx="5" fill="#ffffff" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="736" y="438" width="3" height="28" rx="2" fill="#C8A870"/>
  <text x="813" y="457" font-size="11" fill="#1A2030" font-weight="700" text-anchor="middle">Claude Code</text>

  <line x1="736" y1="480" x2="890" y2="480" stroke="#e9e9e7" stroke-width="1"/>

  <text x="722" y="500" font-size="8.5" fill="#787774">Stack:</text>
  <text x="722" y="516" font-size="8.5" fill="#1A2030">Python · Notion API · Claude</text>

  <text x="722" y="536" font-size="8.5" fill="#787774">Runs inside Claude Code CLI.</text>
  <text x="722" y="551" font-size="8.5" fill="#787774">No server. No scheduler.</text>
  <text x="722" y="566" font-size="8.5" fill="#787774">Paste a URL. It does the rest.</text>

  <line x1="736" y1="580" x2="890" y2="580" stroke="#e9e9e7" stroke-width="1"/>
  <text x="813" y="600" font-size="8" fill="#C8A870" text-anchor="middle" font-weight="600">github.com/Yingshill/signal-to-asset</text>

  <!-- Footer -->
  <line x1="42" y1="652" x2="918" y2="652" stroke="#e9e9e7" stroke-width="1"/>
  <text x="480" y="672" font-size="8" fill="#c9c8c7" text-anchor="middle">Signal to Asset · Code Walkthrough Carousel · Notion Light · 2026-05 · Yingshi Liu</text>

</svg>
