<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="1600" height="900" fill="#F0ECE3"/>

  <!-- Outer card -->
  <defs>
    <clipPath id="card-clip">
      <rect x="88" y="72" width="1424" height="756" rx="24"/>
    </clipPath>
  </defs>
  <rect x="88" y="72" width="1424" height="756" rx="24" fill="#ffffff" stroke="#DDD8CF" stroke-width="1.5"/>

  <!-- Header band -->
  <rect x="88" y="72" width="1424" height="120" fill="#1A2030" clip-path="url(#card-clip)"/>

  <!-- Header: artifact label -->
  <text x="116" y="104" font-size="11" font-weight="600" fill="#6B7280" letter-spacing="2">CASE STUDY · SIGNAL TO ASSET</text>

  <!-- Header: title -->
  <text x="116" y="151" font-size="42" font-weight="800" fill="#ffffff">1 URL. <tspan fill="#E8C98A">5 Posts. Done.</tspan></text>

  <!-- Header: tagline -->
  <text x="116" y="176" font-size="13.5" fill="#9CA3AF">Claude Code agent · Notion API · Python · ~2 min end-to-end · ~$0.05/run</text>

  <!-- Header: meta pills -->
  <rect x="1192" y="88" width="96" height="24" rx="5" fill="#162030" stroke="#2A3550" stroke-width="1"/>
  <text x="1240" y="104" font-size="11" fill="#D1D5DB" text-anchor="middle">Yingshi Liu</text>
  <rect x="1296" y="88" width="76" height="24" rx="5" fill="#162030" stroke="#2A3550" stroke-width="1"/>
  <text x="1334" y="104" font-size="11" fill="#D1D5DB" text-anchor="middle">May 2026</text>
  <rect x="1380" y="88" width="100" height="24" rx="5" fill="#162030" stroke="#2A3550" stroke-width="1"/>
  <text x="1430" y="104" font-size="11" fill="#D1D5DB" text-anchor="middle">Open source</text>

  <!-- Column dividers -->
  <line x1="557" y1="208" x2="557" y2="800" stroke="#DDD8CF" stroke-width="1"/>
  <line x1="1042" y1="208" x2="1042" y2="800" stroke="#DDD8CF" stroke-width="1"/>

  <!-- ═══════════════════════════════ -->
  <!-- LEFT COLUMN: Problem + Stack   -->
  <!-- ═══════════════════════════════ -->

  <text x="116" y="224" font-size="10" font-weight="700" fill="#C8A870" letter-spacing="1.5">THE PROBLEM</text>
  <text x="116" y="252" font-size="23" font-weight="700" fill="#1A2030">One insight.</text>
  <text x="116" y="278" font-size="23" font-weight="700" fill="#1A2030">Hours of manual work.</text>

  <text x="116" y="304" font-size="13" fill="#787774">I capture ideas constantly — in Notion, in articles,</text>
  <text x="116" y="320" font-size="13" fill="#787774">in podcasts. The bottleneck isn't having insights.</text>
  <text x="116" y="336" font-size="13" fill="#787774">It's turning them into publishable content.</text>

  <!-- Step items -->
  <rect x="116" y="354" width="405" height="28" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="134" y="373" font-size="12" font-weight="700" fill="#787774">①</text>
  <text x="154" y="373" font-size="12" fill="#1A2030">Draft the angle for the audience</text>

  <rect x="116" y="388" width="405" height="28" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="134" y="407" font-size="12" font-weight="700" fill="#787774">②</text>
  <text x="154" y="407" font-size="12" fill="#1A2030">Write the full post body</text>

  <rect x="116" y="422" width="405" height="28" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="134" y="441" font-size="12" font-weight="700" fill="#787774">③</text>
  <text x="154" y="441" font-size="12" fill="#1A2030">Reformat for each platform</text>

  <rect x="116" y="456" width="405" height="28" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="134" y="475" font-size="12" font-weight="700" fill="#787774">④</text>
  <text x="154" y="475" font-size="12" fill="#1A2030">Create and link publish tasks</text>

  <!-- Problem stat -->
  <rect x="116" y="496" width="405" height="32" rx="6" fill="#F5EBE5" stroke="#D4B0A0" stroke-width="1"/>
  <text x="318" y="517" font-size="13" font-weight="700" fill="#9E6B55" text-anchor="middle">30–60 min · Per idea · Per channel</text>

  <!-- Stack separator -->
  <line x1="116" y1="546" x2="521" y2="546" stroke="#e9e9e7" stroke-width="1"/>

  <text x="116" y="566" font-size="10" font-weight="700" fill="#C8A870" letter-spacing="1.5">STACK</text>

  <!-- Stack pills row 1 -->
  <rect x="116" y="580" width="116" height="26" rx="4" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="116" y="580" width="3" height="26" rx="2" fill="#C8A870"/>
  <text x="174" y="598" font-size="11" font-weight="600" fill="#1A2030" text-anchor="middle">Claude Code</text>

  <rect x="240" y="580" width="86" height="26" rx="4" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="240" y="580" width="3" height="26" rx="2" fill="#C8A870"/>
  <text x="283" y="598" font-size="11" font-weight="600" fill="#1A2030" text-anchor="middle">Python 3</text>

  <rect x="334" y="580" width="116" height="26" rx="4" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="334" y="580" width="3" height="26" rx="2" fill="#C8A870"/>
  <text x="392" y="598" font-size="11" font-weight="600" fill="#1A2030" text-anchor="middle">Notion API v1</text>

  <!-- Stack pills row 2 -->
  <rect x="116" y="614" width="114" height="26" rx="4" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="116" y="614" width="3" height="26" rx="2" fill="#C8A870"/>
  <text x="173" y="632" font-size="11" font-weight="600" fill="#1A2030" text-anchor="middle">python-dotenv</text>

  <rect x="238" y="614" width="82" height="26" rx="4" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="238" y="614" width="3" height="26" rx="2" fill="#C8A870"/>
  <text x="279" y="632" font-size="11" font-weight="600" fill="#1A2030" text-anchor="middle">requests</text>

  <rect x="328" y="614" width="74" height="26" rx="4" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="328" y="614" width="3" height="26" rx="2" fill="#C8A870"/>
  <text x="365" y="632" font-size="11" font-weight="600" fill="#1A2030" text-anchor="middle">pytest</text>

  <!-- ═══════════════════════════════════ -->
  <!-- CENTER COLUMN: System + How It Works -->
  <!-- ═══════════════════════════════════ -->

  <text x="601" y="224" font-size="10" font-weight="700" fill="#C8A870" letter-spacing="1.5">THE SYSTEM</text>
  <text x="601" y="252" font-size="23" font-weight="700" fill="#1A2030">Claude Code as the</text>
  <text x="601" y="278" font-size="23" font-weight="700" fill="#1A2030">creative engine.</text>

  <text x="601" y="304" font-size="13" fill="#787774">Paste a Notion URL. The agent fetches, asks</text>
  <text x="601" y="320" font-size="13" fill="#787774">for your hook, drafts 5 assets, and saves</text>
  <text x="601" y="336" font-size="13" fill="#787774">everything to Notion — with approval gate.</text>

  <!-- Flow diagram: 3 boxes -->
  <rect x="601" y="356" width="116" height="44" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="601" y="356" width="3" height="44" rx="2" fill="#C8A870"/>
  <text x="659" y="375" font-size="11" font-weight="700" fill="#1A2030" text-anchor="middle">Notion URL</text>
  <text x="659" y="391" font-size="10" fill="#787774" text-anchor="middle">source entry</text>

  <text x="735" y="382" font-size="18" fill="#c9c8c7" text-anchor="middle">→</text>

  <rect x="755" y="356" width="116" height="44" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="755" y="356" width="3" height="44" rx="2" fill="#C8A870"/>
  <text x="813" y="375" font-size="11" font-weight="700" fill="#1A2030" text-anchor="middle">Claude Code</text>
  <text x="813" y="391" font-size="10" fill="#787774" text-anchor="middle">fetch · draft · save</text>

  <text x="889" y="382" font-size="18" fill="#c9c8c7" text-anchor="middle">→</text>

  <rect x="909" y="356" width="97" height="44" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="909" y="356" width="3" height="44" rx="2" fill="#7B9EA6"/>
  <text x="957" y="374" font-size="10.5" font-weight="700" fill="#1A2030" text-anchor="middle">5 Assets</text>
  <text x="957" y="389" font-size="10.5" font-weight="700" fill="#1A2030" text-anchor="middle">+ To-Dos</text>

  <!-- Separator -->
  <line x1="601" y1="420" x2="1006" y2="420" stroke="#e9e9e7" stroke-width="1"/>

  <text x="601" y="444" font-size="10" font-weight="700" fill="#C8A870" letter-spacing="1.5">HOW IT WORKS</text>

  <!-- Step A -->
  <rect x="601" y="460" width="405" height="52" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="601" y="460" width="3" height="52" rx="2" fill="#C8A870"/>
  <text x="619" y="480" font-size="11.5" font-weight="700" fill="#1A2030">fetch_entry.py</text>
  <text x="619" y="497" font-size="11" fill="#787774">Reads: Title · Core Insight · Why It Matters · Status</text>
  <text x="619" y="510" font-size="11" fill="#787774">Returns structured dict. Caches response 10 min TTL.</text>

  <text x="809" y="527" font-size="13" fill="#c9c8c7" text-anchor="middle">↓</text>

  <!-- Step B -->
  <rect x="601" y="534" width="405" height="52" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="601" y="534" width="3" height="52" rx="2" fill="#C8A870"/>
  <text x="619" y="554" font-size="11.5" font-weight="700" fill="#1A2030">Claude writes 5 assets</text>
  <text x="619" y="571" font-size="11" fill="#787774">LinkedIn PM + DE · RedNote carousel · X · Notion Publish</text>
  <text x="619" y="584" font-size="11" fill="#787774">Human approval gate before saving.</text>

  <text x="809" y="601" font-size="13" fill="#c9c8c7" text-anchor="middle">↓</text>

  <!-- Step C -->
  <rect x="601" y="608" width="405" height="52" rx="6" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <rect x="601" y="608" width="3" height="52" rx="2" fill="#C8A870"/>
  <text x="619" y="628" font-size="11.5" font-weight="700" fill="#1A2030">create_asset.py + create_todo.py</text>
  <text x="619" y="645" font-size="11" fill="#787774">Writes to Marketing Assets DB · type, channel, hook, content</text>
  <text x="619" y="658" font-size="11" fill="#787774">Creates Review + Publish tasks linked per asset.</text>

  <!-- ═══════════════════════════════ -->
  <!-- RIGHT COLUMN: Results          -->
  <!-- ═══════════════════════════════ -->

  <text x="1086" y="224" font-size="10" font-weight="700" fill="#C8A870" letter-spacing="1.5">RESULTS</text>
  <text x="1086" y="252" font-size="23" font-weight="700" fill="#1A2030">From bottleneck to</text>
  <text x="1086" y="278" font-size="23" font-weight="700" fill="#1A2030">batch in ~2 min.</text>

  <!-- 2×2 metric cards -->
  <rect x="1086" y="298" width="196" height="78" rx="8" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="1184" y="342" font-size="28" font-weight="800" fill="#1A2030" text-anchor="middle">~2 min</text>
  <text x="1184" y="362" font-size="10" fill="#787774" text-anchor="middle">URL to ready-to-review</text>

  <rect x="1295" y="298" width="196" height="78" rx="8" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="1393" y="342" font-size="28" font-weight="800" fill="#1A2030" text-anchor="middle">5</text>
  <text x="1393" y="362" font-size="10" fill="#787774" text-anchor="middle">assets drafted per run</text>

  <rect x="1086" y="388" width="196" height="78" rx="8" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="1184" y="432" font-size="28" font-weight="800" fill="#1A2030" text-anchor="middle">8+</text>
  <text x="1184" y="452" font-size="10" fill="#787774" text-anchor="middle">to-dos linked in Notion</text>

  <rect x="1295" y="388" width="196" height="78" rx="8" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="1"/>
  <text x="1393" y="432" font-size="28" font-weight="800" fill="#1A2030" text-anchor="middle">$0.05</text>
  <text x="1393" y="452" font-size="10" fill="#787774" text-anchor="middle">API cost per run</text>

  <!-- Results separator -->
  <line x1="1086" y1="484" x2="1491" y2="484" stroke="#e9e9e7" stroke-width="1"/>

  <!-- Tick items -->
  <text x="1086" y="510" font-size="15" font-weight="700" fill="#7B9EA6">✓</text>
  <text x="1110" y="510" font-size="12.5" fill="#1A2030">5 platform-ready drafts in one run</text>

  <text x="1086" y="538" font-size="15" font-weight="700" fill="#7B9EA6">✓</text>
  <text x="1110" y="538" font-size="12.5" fill="#1A2030">Every asset linked to project + tasks in Notion</text>

  <text x="1086" y="566" font-size="15" font-weight="700" fill="#7B9EA6">✓</text>
  <text x="1110" y="566" font-size="12.5" fill="#1A2030">Human approval gate — agent never publishes</text>

  <text x="1086" y="594" font-size="15" font-weight="700" fill="#7B9EA6">✓</text>
  <text x="1110" y="594" font-size="12.5" fill="#1A2030">Notion reads cached · no repeated API calls</text>

  <text x="1086" y="622" font-size="15" font-weight="700" fill="#7B9EA6">✓</text>
  <text x="1110" y="622" font-size="12.5" fill="#1A2030">No server · no scheduler · runs on demand</text>

  <!-- Footer -->
  <line x1="116" y1="800" x2="1496" y2="800" stroke="#e9e9e7" stroke-width="1"/>
  <text x="116" y="820" font-size="11" fill="#787774">Signal to Asset · Case Study · Notion Light · 2026 · Yingshi Liu</text>
  <text x="1496" y="820" font-size="11" fill="#C8A870" text-anchor="end">github.com/Yingshill/signal-to-asset</text>

</svg>
