<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F6F7FB"/>

  <rect x="88" y="72" width="1424" height="756" rx="24" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2"/>

  <rect x="128" y="112" width="1344" height="220" rx="18" fill="#111827"/>
  <text x="168" y="164" fill="#9CA3AF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="2">CASE STUDY / SIGNAL TO ASSET</text>
  <text x="168" y="234" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800">1 URL. 5 posts. Done.</text>
  <text x="168" y="286" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="27">A Claude Code agent turns one Notion source entry into channel-ready drafts</text>
  <text x="168" y="320" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="27">and linked follow-up tasks in under two minutes.</text>

  <rect x="128" y="368" width="376" height="210" rx="18" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2"/>
  <circle cx="176" cy="418" r="22" fill="#DBEAFE"/>
  <text x="169" y="426" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">1</text>
  <text x="216" y="426" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">Fetch source</text>
  <text x="168" y="482" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="24">Paste a Notion URL.</text>
  <text x="168" y="516" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="24">The agent reads title, core insight,</text>
  <text x="168" y="550" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="24">why it matters, and source link.</text>

  <rect x="612" y="368" width="376" height="210" rx="18" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2"/>
  <circle cx="660" cy="418" r="22" fill="#E0E7FF"/>
  <text x="653" y="426" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">2</text>
  <text x="700" y="426" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">Draft assets</text>
  <text x="652" y="482" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="24">Claude writes five versions:</text>
  <text x="652" y="516" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="24">LinkedIn PM, LinkedIn DE, RedNote,</text>
  <text x="652" y="550" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="24">X, and a Notion publish page.</text>

  <rect x="1096" y="368" width="376" height="210" rx="18" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2"/>
  <circle cx="1144" cy="418" r="22" fill="#DCFCE7"/>
  <text x="1137" y="426" fill="#15803D" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">3</text>
  <text x="1184" y="426" fill="#14532D" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">Save to Notion</text>
  <text x="1136" y="482" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="24">Every asset is linked to review</text>
  <text x="1136" y="516" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="24">and publish tasks.</text>
  <text x="1136" y="550" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="24">Human approval stays required.</text>

  <path d="M524 473H588" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M576 457L592 473L576 489" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1008 473H1072" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M1060 457L1076 473L1060 489" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="128" y="630" width="314" height="128" rx="18" fill="#F8FAFC" stroke="#D8DEE9" stroke-width="2"/>
  <text x="168" y="692" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">~2 min</text>
  <text x="168" y="732" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="23">URL to ready-to-review</text>

  <rect x="482" y="630" width="314" height="128" rx="18" fill="#F8FAFC" stroke="#D8DEE9" stroke-width="2"/>
  <text x="522" y="692" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">5 assets</text>
  <text x="522" y="732" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="23">Drafted per run</text>

  <rect x="836" y="630" width="314" height="128" rx="18" fill="#F8FAFC" stroke="#D8DEE9" stroke-width="2"/>
  <text x="876" y="692" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">8+ tasks</text>
  <text x="876" y="732" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="23">Linked in Notion</text>

  <rect x="1190" y="630" width="282" height="128" rx="18" fill="#ECFDF5" stroke="#BBF7D0" stroke-width="2"/>
  <text x="1230" y="692" fill="#14532D" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">$0.05</text>
  <text x="1230" y="732" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="23">Approx. cost per run</text>
</svg>
