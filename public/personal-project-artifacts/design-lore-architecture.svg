<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="900" fill="#F0ECE3" />
  
  <!-- Outer Card -->
  <rect x="88" y="72" width="1424" height="756" rx="24" fill="#F5F0E8" stroke="#e9e9e7" stroke-width="2" />
  
  <!-- Header Band -->
  <path d="M88 96C88 82.7452 98.7452 72 112 72H1488C1501.25 72 1512 82.7452 1512 96V188H88V96Z" fill="#1A2030" />
  
  <!-- Header Text -->
  <text x="128" y="114" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#787774" letter-spacing="1px">ARCHITECTURE DIAGRAM</text>
  <text x="128" y="164" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">
    DesignLore <tspan fill="#E8C98A">Monorepo System Architecture</tspan>
  </text>

  <!-- LAYER 1: INTERACTION -->
  <g transform="translate(128, 230)">
    <rect width="1344" height="100" rx="12" fill="#FFFFFF" stroke="#e9e9e7" stroke-width="1" />
    <rect width="160" height="24" rx="4" fill="#C8A870" x="20" y="-12" />
    <text x="35" y="5" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">INTERACTION LAYER</text>
    
    <rect x="40" y="30" width="300" height="40" rx="6" fill="#1A2030" />
    <text x="60" y="55" font-family="JetBrains Mono, monospace" font-size="14" fill="#E8C98A">packages/cli (lore command)</text>
    
    <text x="380" y="55" font-family="Inter, sans-serif" font-size="14" fill="#787774">Commander.js interface • User Input • Command Orchestration</text>
  </g>

  <!-- LAYER 2: CORE LOGIC (THE HUB) -->
  <g transform="translate(128, 370)">
    <rect width="1344" height="320" rx="12" fill="#FFFFFF" stroke="#C8A870" stroke-width="2" />
    <rect width="160" height="24" rx="4" fill="#C8A870" x="20" y="-12" />
    <text x="35" y="5" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">CORE LOGIC LAYER</text>
    <text x="1324" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#C8A870" text-anchor="end">packages/core</text>

    <!-- Sub-module: Aura -->
    <rect x="40" y="40" width="380" height="240" rx="8" fill="#F9F9F9" stroke="#e9e9e7" />
    <text x="60" y="75" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1A2030">Aura Service</text>
    <text x="60" y="95" font-family="Inter, sans-serif" font-size="12" fill="#787774">aura.ts (Puppeteer Capture)</text>
    <line x1="60" y1="110" x2="400" y2="110" stroke="#e9e9e7" stroke-width="1" />
    <text x="60" y="140" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• Headless DOM Extraction</text>
    <text x="60" y="165" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• DNA Heuristic Engine</text>
    <text x="60" y="190" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• Technical "Health" Audit</text>
    <rect x="60" y="215" width="340" height="40" rx="4" fill="#F5F0E8" />
    <text x="75" y="240" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#C8A870">URL → Technical Variables</text>

    <!-- Sub-module: Storage -->
    <rect x="482" y="40" width="380" height="240" rx="8" fill="#F9F9F9" stroke="#e9e9e7" />
    <text x="502" y="75" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1A2030">Storage Controller</text>
    <text x="502" y="95" font-family="Inter, sans-serif" font-size="12" fill="#787774">storage.ts (Vault Manager)</text>
    <line x1="502" y1="110" x2="842" y2="110" stroke="#e9e9e7" stroke-width="1" />
    <text x="502" y="140" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• Lore Entry Lifecycle (CRUD)</text>
    <text x="502" y="165" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• Asset Bundle Export/Import</text>
    <text x="502" y="190" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• Backup &amp; Health Diagnostics</text>
    <rect x="502" y="215" width="340" height="40" rx="4" fill="#F5F0E8" />
    <text x="517" y="240" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#C8A870">JSON Vault Database</text>

    <!-- Sub-module: Forge -->
    <rect x="924" y="40" width="380" height="240" rx="8" fill="#F9F9F9" stroke="#e9e9e7" />
    <text x="944" y="75" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1A2030">Forge Service</text>
    <text x="944" y="95" font-family="Inter, sans-serif" font-size="12" fill="#787774">forge.ts (The Transmuter)</text>
    <line x1="944" y1="110" x2="1284" y2="110" stroke="#e9e9e7" stroke-width="1" />
    <text x="944" y="140" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• DNA-to-Component Mapping</text>
    <text x="944" y="165" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• Gemini AI Inference</text>
    <text x="944" y="190" font-family="Inter, sans-serif" font-size="13" fill="#1A2030">• React + Tailwind Generation</text>
    <rect x="944" y="215" width="340" height="40" rx="4" fill="#F0F9FF" />
    <text x="959" y="240" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#7B9EA6">Production-Ready Code</text>
  </g>

  <!-- LAYER 3: DATA & PRESENTATION -->
  <g transform="translate(128, 720)">
    <rect width="1344" height="60" rx="12" fill="#FFFFFF" stroke="#e9e9e7" stroke-width="1" />
    <rect width="180" height="24" rx="4" fill="#7B9EA6" x="20" y="-12" />
    <text x="35" y="5" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">PRESENTATION LAYER</text>
    
    <text x="40" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1A2030">Gallery &amp; Reports</text>
    <text x="240" y="35" font-family="Inter, sans-serif" font-size="14" fill="#787774">packages/gallery (Express + HTML Templates)</text>
    
    <circle cx="680" cy="30" r="4" fill="#7B9EA6" />
    <text x="700" y="35" font-family="Inter, sans-serif" font-size="14" fill="#1A2030">Case Study Architect</text>
    
    <circle cx="920" cy="30" r="4" fill="#7B9EA6" />
    <text x="940" y="35" font-family="Inter, sans-serif" font-size="14" fill="#1A2030">Interactive Technical Vault</text>
    
    <circle cx="1180" cy="30" r="4" fill="#7B9EA6" />
    <text x="1200" y="35" font-family="Inter, sans-serif" font-size="14" fill="#1A2030">Social Content Engine</text>
  </g>

  <!-- Connectors -->
  <path d="M800 330 V370" stroke="#C8A870" stroke-width="2" fill="none" />
  <path d="M800 690 V720" stroke="#7B9EA6" stroke-width="2" fill="none" />
  
  <!-- Footer -->
  <text x="1456" y="810" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="#787774" letter-spacing="0.5px" text-anchor="end">
    Architecture Diagram · DesignLore Monorepo · Mac · 2026-05-16
  </text>
</svg>
